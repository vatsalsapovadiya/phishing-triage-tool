<!DOCTYPE html>
<html>
<head>
  <title>Phishing Triage Tool</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d1117; color: #c9d1d9;
      font-family: 'Courier New', monospace;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: 100vh; padding: 20px;
    }
    h1 { color: #00f2ff; font-size: 2rem; margin-bottom: 8px; }
    p  { color: #8b949e; margin-bottom: 30px; }
    .card {
      background: #161b22; border: 1px solid #30363d;
      border-radius: 10px; padding: 40px; width: 100%;
      max-width: 500px; text-align: center;
    }
    .drop-zone {
      border: 2px dashed #30363d; border-radius: 8px;
      padding: 40px; margin: 20px 0;
    }
    button {
      background: #00f2ff; color: #0d1117;
      border: none; padding: 12px 30px;
      border-radius: 6px; font-weight: bold;
      font-size: 1rem; cursor: pointer;
      width: 100%; margin-top: 10px;
    }
    button:hover { background: #58a6ff; }
    .icon { font-size: 3rem; margin-bottom: 10px; }
    input[type=file] {
      color: #c9d1d9;
      width: 100%;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">🛡️</div>
    <h1>Phishing Triage Tool</h1>
    <p>Upload a suspicious .eml file for automated analysis.</p>
    <form action="/analyze" method="POST" enctype="multipart/form-data">
      <div class="drop-zone">
        <p>📧 Select your .eml file below</p>
        <!-- File input visible directly — no JS click trick -->
        <input type="file" name="email_file" accept=".eml" required>
      </div>
      <button type="submit">▶ Analyze Email</button>
    </form>
  </div>
</body>
</html>
